{% extends 'base.html' %}
{% block title %}Login - RoadmapAI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 fade-in">
    <div class="bg-white rounded-2xl shadow-sm p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h2>
        <p class="text-gray-500 text-sm mb-6">Continue your learning journey</p>
        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400">
            </div>
            <button type="submit" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
                Sign In
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            No account? <a href="/register" class="text-purple-600 font-medium">Register free</a>
        </p>
    </div>
</div>
{% endblock %}
